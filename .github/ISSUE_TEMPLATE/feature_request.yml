name: "✨ 機能提案・改善要望"
description: "新機能の追加や既存機能の改善を提案してください。"
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        機能提案ありがとうございます。提案の背景や目的を詳しく記入していただけると、検討がスムーズになります。

  - type: textarea
    id: summary
    attributes:
      label: "提案の概要"
      description: "追加・改善したい機能を簡潔に説明してください。"
      placeholder: "例: ◯◯コマンドに --verbose オプションを追加する"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "背景・モチベーション"
      description: "なぜこの機能が必要か、現状どのような問題があるかを説明してください。"
      placeholder: "例: 現在は◯◯の情報を確認する手段がなく、デバッグが困難なため"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "提案する解決策・実装イメージ"
      description: "どのように実装・動作してほしいかを説明してください。UI の変化やコマンド例などがあると助かります。"
      placeholder: |
        例:
        - /lunarlog コマンドを追加し、直近のログ 20 件を Discord 上に表示する
        - ログレベルをオプションで絞り込めるようにする
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "検討した代替案"
      description: "他に検討したアプローチがあれば記入してください。なければ「なし」と記入してください。"
      placeholder: "例: 既存の◯◯コマンドを拡張することも検討したが、◯◯の理由で別コマンドの方が良いと判断した"
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "優先度（主観）"
      description: "この機能がどのくらい重要だと感じるか選んでください。"
      options:
        - "低 — あると便利"
        - "中 — 定期的に困っている"
        - "高 — 重要な作業がブロックされている"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: "コントリビューション意思"
      options:
        - label: "この機能の実装を自分でプルリクエストとして提出したい"
          required: false

  - type: textarea
    id: additional
    attributes:
      label: "その他・補足情報"
      description: "参考リンク、スクリーンショット、関連 Issue など追加情報があれば記入してください。"
    validations:
      required: false
