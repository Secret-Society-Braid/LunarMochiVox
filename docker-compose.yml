services:
  lunarmochivox_bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - voicevox_api_for_lunar
    environment:
      - VOICEVOX_API_PORT=50021
      - VOICEVOX_API_HOST=voicevox_api
  voicevox_api_for_lunar:
    image: 'voicevox/voicevox_engine:cpu-0.25.1'
    container_name: voicevox_api_for_lunar
    ports:
      - "50021:50021"
